# ===================================================================
# Kitty Terminal Configuration - 2026 Fresh Dev Edition
# ===================================================================

# ===== FONTS (proper variants for crisp rendering) =====
# font_family      JetBrains Mono
# bold_font        JetBrains Mono Bold
# italic_font      JetBrains Mono Italic
# bold_italic_font JetBrains Mono Bold Italic
font_size        11.0
disable_ligatures never

# ===== COLORS - Catppuccin Mocha (modern, cozy, high contrast) =====
# foreground            #cdd6f4
# background            #1e1e2e
# selection_foreground  #1e1e2e
# selection_background  #f5c2e7

# Base 16 + extended
# color0   #1e1e2e
# color8   #585b70
# color1   #f38ba8
# color9   #f38ba8
# color2   #a6e3a1
# color10  #a6e3a1
# color3   #f9e2af
# color11  #f9e2af
# color4   #89b4fa
# color12  #89b4fa
# color5   #cba6f7
# color13  #cba6f7
# color6   #94e2d5
# color14  #94e2d5
# color7   #bac2de
# color15  #cdd6f4

# Cursor & URL
# cursor                #f5c2e7
# cursor_text_color     #1e1e2e
cursor_shape          underline
cursor_blink_interval 0.5
cursor_underline_thickness 1.5
cursor_trail 1
# url_color             #89b4fa
url_style             curly

# ===== WINDOW & APPEARANCE =====
background_opacity    0.90
dynamic_background_opacity yes
window_padding_width  8
hide_window_decorations no
remember_window_size  no
initial_window_width  100c
initial_window_height 25c

# ===== TABS (cleaner, more modern) =====
tab_bar_edge          bottom
tab_bar_style         powerline
tab_powerline_style   round
tab_title_template    "{index}. {title}"
# active_tab_foreground   #1e1e2e
# active_tab_background   #f5c2e7
# inactive_tab_foreground #cdd6f4
# inactive_tab_background #313244

# ===== KEYBINDINGS (kept your muscle memory + a few modern additions) =====
# map ctrl+shift+t   new_tab       → replaced by ctrl+alt+enter
# map ctrl+shift+w   close_tab     → replaced by ctrl+alt+w
# map ctrl+shift+right next_tab   → replaced by ctrl+alt+l
# map ctrl+shift+left  previous_tab  → replaced by ctrl+alt+h
# map ctrl+shift+q   close_os_window  → replaced by ctrl+alt+q

# Tab control (ctrl+alt — higher level than panes)
map ctrl+alt+enter  new_tab
map ctrl+alt+w      close_tab
map ctrl+alt+q      close_os_window

# map ctrl+shift+enter new_window
# map ctrl+shift+n     new_os_window
# map ctrl+shift+]     next_window   → replaced by ctrl+shift+l
# map ctrl+shift+[     previous_window  → replaced by ctrl+shift+h

# Tab navigation (vim motions — linear, higher level)
map ctrl+alt+h     previous_tab
map ctrl+alt+l     next_tab

# Tab reordering
map ctrl+alt+,     move_tab_backward
map ctrl+alt+.     move_tab_forward

# Pane navigation (vim motions — directional, 4-way)
map ctrl+shift+h   neighboring_window left
map ctrl+shift+j   neighboring_window down
map ctrl+shift+k   neighboring_window up
map ctrl+shift+l   neighboring_window right

# Pane reordering
map ctrl+shift+alt+h   move_window left
map ctrl+shift+alt+j   move_window bottom
map ctrl+shift+alt+k   move_window top
map ctrl+shift+alt+l   move_window right

map ctrl+left resize_window narrower
map ctrl+right resize_window wider
map ctrl+up resize_window taller
map ctrl+down resize_window shorter 3
map ctrl+home resize_window reset

map ctrl+shift+s save_as_session --use-foreground-process --relocatable
map ctrl+shift+alt+n set_window_title

# Font size (your existing + extra convenience)
map ctrl+plus      change_font_size all +2.0
map ctrl+equal     change_font_size all +2.0
map ctrl+minus     change_font_size all -2.0
map ctrl+0         change_font_size all 0

# Copy/Paste + modern clipboard
map ctrl+shift+c   copy_to_clipboard
map ctrl+shift+v   paste_from_clipboard
map shift+insert   paste_from_selection

# Scrollback & search (your existing + page shortcuts)
map ctrl+shift+f   show_scrollback

# Clear with confirmation
map ctrl+shift+delete clear_terminal reset active

# Extra: quick layout cycling (native Kitty strength)
map ctrl+shift+space   next_layout

# ===== PERFORMANCE & SHELL =====
repaint_delay         8
input_delay           2
sync_to_monitor       yes
shell_integration     enabled

# ===== BELL & MOUSE =====
enable_audio_bell     no
mouse_hide_wait       3.0
copy_on_select        yes

# ===== ADVANCED =====
allow_remote_control  yes
update_check_interval 0


# BEGIN_KITTY_THEME
# 1984 Orwellian
include current-theme.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="0xProto Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
